# Catppuccin Mocha Theme
[colors]

#cursor = { text = "#f5e0dc", cursor = "#1e1e2e" }
#selection = { text = "#f5e0dc", background = "#585b70" }

#draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[colors.bright]
black = "#585b70"
red = "#89d88b"
green = "#89d88b"
yellow = "#ebd391"
blue = "#f2aede"
magenta = "#f2aede"
cyan = "#6bd7ca"
white = "#bac2de"

