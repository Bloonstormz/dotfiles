# vim:set ft=tmux:
%hidden MODULE_NAME="gitmux"

# Requires https://github.com/arl/gitmux

set -g "@catppuccin_${MODULE_NAME}_hide" '#{E:?#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}"),,1}'
set -ogq "@catppuccin_${MODULE_NAME}_icon" "󰊢 "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_teal}"
set -gq "@catppuccin_${MODULE_NAME}_text" ' #{s|.*/|../|:#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}")}'

source -F "#{d:current_file}/../utils/status_module.conf"
