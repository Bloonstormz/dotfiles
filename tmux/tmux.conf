set -g mouse on
set -g history-limit 10000
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -g default-terminal "tmux-256color"
set -g mode-keys vi

bind-key m set -g mouse
bind-key \" split-window -vc '#{pane_current_path}'
bind-key % split-window -hc '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Better Mouse Mode Configuration
set -g @scroll-without-changing-pane "on"

# Tmux-yank
set -g @yank_action 'copy-pipe'

# Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Themes
set -g @catppuccin_flavor 'mocha'

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #[bold,italics]#W#[none]"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"

set -g status-left " "
set -g status-right "        " # Minimum separation from status-left
set -g status-right-length 100

set -g @catppuccin_status_right_separator " "

run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'

set -ag status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_mode}"
set -ag status-right "#{E:@catppuccin_status_gitmux}"

# Run tmux plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
